[tox]
envlist =
    begin,
    py{37,38,39,310,311,312,313}-{json,json5,s3},
    end,
    black,
    flake8,
    semgrep
skip_missing_interpreters = True
requires =
    # Required to support testing python 3.7. Some how virtualenv will install
    # newer versions that specifically say they are not compatible with 3.7
    virtualenv<20.27.0

[testenv]
changedir = {toxinidir}
package = editable
passenv =
    GITHUB_ACTIONS
    HAB_TEST_UNCACHED_ONLY
deps =
    -rrequirements.txt
    covdefaults
    coverage
    pytest
    json5: pyjson5
    s3: .[s3]
    s3: moto[s3]
    s3: requests-mock
commands =
    coverage run -m pytest {tty:--color=yes} {posargs:tests/}

[testenv:begin]
basepython = python3
deps =
    coverage[toml]
    build
commands =
    coverage erase

[testenv:py{37,38,39,310,311,312,313}-{json,json5,s3}]
depends = begin

[testenv:end]
basepython = python3
depends =
    begin
    py{37,38,39,310,311,312,313}-{json,json5,s3}
parallel_show_output = True
deps =
    coverage
commands =
    coverage combine
    coverage report

[testenv:black]
basepython = python3
deps =
    black==22.12.0
commands =
    black . --check

[testenv:flake8]
basepython = python3
deps =
    flake8-bugbear==22.12.6
    Flake8-pyproject
    flake8==5.0.4
    pep8-naming==0.13.3
commands =
    flake8 .

[testenv:semgrep]
deps = semgrep
commands =
    semgrep --config semgrep-json.yaml .
